name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Dummy Supabase env so the build/e2e boot without real secrets (the app's
# backend is mocked in tests; the client only needs the vars to be present).
env:
  VITE_SUPABASE_URL: https://demo.supabase.co
  VITE_SUPABASE_ANON_KEY: ci-anon-key

jobs:
  quality:
    name: lint · typecheck · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
